<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BRBOX HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #0f0f0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .title {
            color: #ff4757;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .message {
            color: #e0e0e0;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        .message strong {
            color: #ff6b81;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border-radius: 2px;
            margin: 0 auto 25px auto;
        }
        .footer {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📦</div>
        <div class="title">Fim do BRBOX HUB</div>
        <div class="divider"></div>
        <div class="message">
            Infelizmente chegou o fim do <strong>BRBOX HUB</strong>.<br><br>
            Os scripts não irão acabar! Vocês ainda vão receber scripts aqui pelo app.
        </div>
        <div class="footer">Obrigado por tudo! 💜</div>
    </div>
</body>
</html>
